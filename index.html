<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el amor de mi vida ♥</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♥</text></svg>">
    <style>
        /* ===== TEMA DE COLOR ===== */
        :root {
            --accent: #87CEEB;
            --accent-rgb: 135, 206, 250;
            --bg-start: #0a0e27;
            --bg-mid: #1a1f3a;
            --bg-end: #0f1428;
            --star-color: white;
            --bg-gradient: linear-gradient(to bottom, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
        }

        body.theme-rosa {
            --accent: #f4a7c3;
            --accent-rgb: 244, 167, 195;
            --bg-start: #1a0a14;
            --bg-mid: #2a0f1e;
            --bg-end: #120810;
            --star-color: #ffe0f0;
            --bg-gradient: linear-gradient(to bottom, #1a0a14 0%, #2a0f1e 50%, #120810 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-gradient);
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Georgia', serif;
            min-height: 100vh;
        }

        /* ===== SECCIÓN GALERÍA ===== */
        .gallery-section {
            position: relative;
            z-index: 5;
            margin-top: 100vh;
            padding: 60px 20px 80px;
            background: linear-gradient(to bottom, transparent, #07091a 120px);
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .gallery-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .gallery-title {
            text-align: center;
            color: rgba(255,255,255,0.85);
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(var(--accent-rgb),0.7);
        }

        .gallery-subtitle {
            text-align: center;
            color: rgba(var(--accent-rgb),0.6);
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 60px;
        }

        .polaroids-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .polaroid {
            background: #f5f0e8;
            padding: 12px 12px 40px;
            width: 160px;
            box-shadow:
                0 6px 20px rgba(0,0,0,0.6),
                0 0 0 1px rgba(255,255,255,0.05);
            cursor: pointer;
            transform: rotate(var(--rot, 0deg)) translateY(30px);
            opacity: 0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: polaroidDrop 0.7s ease forwards;
            animation-delay: var(--delay, 0s);
        }

        .polaroid:hover {
            transform: rotate(0deg) translateY(-8px) scale(1.06) !important;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 30px rgba(var(--accent-rgb),0.3);
            z-index: 10;
        }

        @keyframes polaroidDrop {
            0%   { opacity: 0; transform: rotate(var(--rot)) translateY(50px) scale(0.9); }
            60%  { opacity: 1; transform: rotate(var(--rot)) translateY(-8px) scale(1.02); }
            100% { opacity: 1; transform: rotate(var(--rot)) translateY(0px) scale(1); }
        }

        .polaroid img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
            background: #ccc;
        }

        .polaroid .polaroid-caption {
            margin-top: 8px;
            text-align: center;
            font-size: 11px;
            color: #555;
            font-family: 'Georgia', serif;
            font-style: italic;
            line-height: 1.3;
            min-height: 16px;
        }

        /* Scroll hint */
        .scroll-hint {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            animation: hintBounce 2s ease-in-out infinite;
            pointer-events: none;
        }

        .scroll-hint span {
            color: rgba(255,255,255,0.45);
            font-size: 11px;
            letter-spacing: 2px;
        }

        .scroll-hint .arrow {
            width: 16px;
            height: 16px;
            border-right: 1.5px solid rgba(255,255,255,0.4);
            border-bottom: 1.5px solid rgba(255,255,255,0.4);
            transform: rotate(45deg);
        }

        @keyframes hintBounce {
            0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
            50%       { opacity: 1;   transform: translateX(-50%) translateY(6px); }
        }

        .scroll-hint.hidden { display: none; }

        @media (min-width: 768px) {
            .polaroid { width: 190px; }
            .polaroid img { height: 165px; }
            .gallery-title { font-size: 26px; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            touch-action: none;
        }

        .days-counter {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(var(--accent-rgb),0.6);
            z-index: 10;
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 10px;
        }

        /* ===== CORAZONES FLOTANTES ===== */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 2;
            font-size: var(--size, 14px);
            opacity: 0;
            animation: heartFloat var(--fdur, 8s) ease-in forwards;
            user-select: none;
        }

        @keyframes heartFloat {
            0%   { opacity: 0;    transform: translateY(0)   rotate(0deg)   scale(0.8); }
            10%  { opacity: var(--fop, 0.18); }
            80%  { opacity: var(--fop, 0.18); }
            100% { opacity: 0;    transform: translateY(-110vh) rotate(var(--frot, 30deg)) scale(1.1); }
        }

        /* ===== NAVEGACIÓN DEL LIGHTBOX ===== */
        .modal-nav {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 102;
            background: transparent;
            border: none;
            padding: 0;
            transition: background 0.2s;
        }

        .modal-nav:hover { background: rgba(0,0,0,0.15); }

        .modal-nav.prev { left: -48px; border-radius: 6px 0 0 6px; }
        .modal-nav.next { right: -48px; border-radius: 0 6px 6px 0; }

        .modal-nav svg {
            width: 22px;
            height: 22px;
            stroke: rgba(255,255,255,0.75);
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px rgba(0,0,0,0.6));
            transition: stroke 0.2s;
        }

        .modal-nav:hover svg { stroke: #fff; }

        /* Indicador de posición */
        .modal-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 8px 0 4px;
        }

        .modal-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #bbb;
            transition: background 0.25s, transform 0.25s;
        }

        .modal-dot.active {
            background: #888;
            transform: scale(1.3);
        }
            0%   { opacity: 1; }
            20%  { opacity: 0.85; }
            100% { opacity: 0; }
        }

        /* Partícula de explosión */
        .burst-particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 20;
            animation: burstFly var(--dur, 0.8s) ease-out forwards;
        }

        @keyframes burstFly {
            0%   { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Flash de destello sobre el número */
        .days-number.flash {
            animation: numberFlash 0.5s ease-out;
        }

        @keyframes numberFlash {
            0%   { color: var(--accent); text-shadow: none; transform: scale(1); }
            30%  { color: #fff; text-shadow: 0 0 30px #fff, 0 0 60px var(--accent), 0 0 90px var(--accent); transform: scale(1.35); }
            100% { color: var(--accent); text-shadow: none; transform: scale(1); }
        }

        .days-number {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent);
            display: block;
            margin-top: 5px;
        }

        @media (min-width: 768px) {
            .days-counter {
                top: 30px;
                font-size: 22px;
            }
            .days-number {
                font-size: 32px;
            }
        }

        .love-phrase {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            max-width: 90%;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            padding: 0 15px;
        }

        .love-phrase.show {
            display: block;
            opacity: 1;
        }

        .love-phrase p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(var(--accent-rgb),0.6),
                0 0 30px rgba(var(--accent-rgb),0.4);
            line-height: 1.6;
            font-style: italic;
            animation: textGlow 3s ease-in-out infinite;
            letter-spacing: 0.5px;
        }

        @media (min-width: 768px) {
            .love-phrase {
                bottom: 80px;
            }
            .love-phrase p {
                font-size: 20px;
                line-height: 1.8;
                letter-spacing: 1px;
            }
        }

        .heart-emoji {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 90px;
            color: white;
            z-index: 5;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.9),
                0 0 40px rgba(255, 255, 255, 0.7),
                0 0 60px rgba(var(--accent-rgb),0.5),
                0 0 80px rgba(var(--accent-rgb),0.3);
            animation: heartGlow 2.5s ease-in-out infinite;
            cursor: pointer;
            user-select: none;
        }

        .heart-emoji:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        @media (min-width: 768px) {
            .heart-emoji {
                font-size: 120px;
            }
        }

        @keyframes heartGlow {
            0%, 100% {
                text-shadow: 
                    0 0 20px rgba(255, 255, 255, 0.9),
                    0 0 40px rgba(255, 255, 255, 0.7),
                    0 0 60px rgba(var(--accent-rgb),0.5),
                    0 0 80px rgba(var(--accent-rgb),0.3);
                opacity: 0.95;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                text-shadow: 
                    0 0 30px rgba(255, 255, 255, 1),
                    0 0 50px rgba(255, 255, 255, 0.9),
                    0 0 70px rgba(var(--accent-rgb),0.7),
                    0 0 100px rgba(var(--accent-rgb),0.5);
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        @keyframes textGlow {
            0%, 100% {
                text-shadow: 
                    0 0 10px rgba(255, 255, 255, 0.8),
                    0 0 20px rgba(var(--accent-rgb),0.6),
                    0 0 30px rgba(var(--accent-rgb),0.4);
                opacity: 0.9;
            }
            50% {
                text-shadow: 
                    0 0 20px rgba(255, 255, 255, 1),
                    0 0 30px rgba(var(--accent-rgb),0.8),
                    0 0 40px rgba(var(--accent-rgb),0.6);
                opacity: 1;
            }
        }

        /* ── Overlay oscuro detrás del modal ── */
        .photo-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 99;
            backdrop-filter: blur(3px);
        }
        .photo-modal-overlay.active { display: block; }

        /* ── Polaroid modal ── */
        .photo-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-1.5deg);
            background: #f5f0e8;
            padding: 14px 14px 0 14px;
            max-width: 88vw;
            width: 320px;
            z-index: 100;
            box-shadow:
                0 8px 30px rgba(0,0,0,0.6),
                0 20px 60px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.08);
        }

        @media (min-width: 768px) {
            .photo-modal { width: 380px; }
        }

        .photo-modal.active {
            display: block;
            animation: polaroidPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes polaroidPop {
            0%   { opacity: 0; transform: translate(-50%, -44%) rotate(-1.5deg) scale(0.7); }
            70%  { opacity: 1; transform: translate(-50%, -51%) rotate(-1.5deg) scale(1.04); }
            100% { opacity: 1; transform: translate(-50%, -50%) rotate(-1.5deg) scale(1); }
        }

        .photo-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #ccc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Franja inferior de la polaroid */
        .photo-caption-area {
            padding: 14px 8px 18px;
            text-align: center;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-text {
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 13px;
            color: #444;
            line-height: 1.5;
            letter-spacing: 0.2px;
        }

        /* Cuando no hay texto, mostrar un corazón decorativo */
        .photo-text:empty::after {
            content: '♡';
            font-size: 20px;
            color: #c9a0b0;
        }

        @media (min-width: 768px) {
            .photo-text { font-size: 14px; }
        }

        .close-btn {
            position: fixed;
            top: calc(50% - 50vw * 0.88 / 2 - 38px);
            right: calc(50% - 160px - 10px);
            font-size: 26px;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            background: rgba(0,0,0,0.45);
            border: none;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            line-height: 32px;
            text-align: center;
            z-index: 101;
            transition: background 0.2s, color 0.2s;
        }

        .close-btn:hover {
            background: rgba(var(--accent-rgb), 0.8);
            color: #fff;
        }

        .instructions {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
            z-index: 10;
            text-align: center;
            padding: 0 15px;
            line-height: 1.4;
        }

    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    
    <div class="days-counter" id="daysCounter" style="cursor:default;">
        Días juntos
        <span class="days-number" id="daysCount">0</span>
    </div>

    <div class="heart-emoji" id="heartEmoji">♡</div>

    <div class="love-phrase" id="lovePhrase">
        <p>Te amo más de lo que las palabras pueden expresar.<br>
        Eres mi universo, y quiero quedarme a tu lado hasta que expire.</p>
    </div>

    <div class="photo-modal-overlay" id="photoModalOverlay" onclick="closeModal()"></div>
    <div class="photo-modal" id="photoModal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <button class="modal-nav prev" id="modalPrev" onclick="navigateModal(-1)">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="modal-nav next" id="modalNext" onclick="navigateModal(1)">
            <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
        </button>
        <div class="photo-container" id="photoContainer">
            <img id="photoImage" src="" alt="♥">
        </div>
        <div class="photo-caption-area">
            <p class="photo-text" id="photoText"></p>
        </div>
        <div class="modal-dots" id="modalDots"></div>
    </div>

    <!--div class="instructions">
        Haz clic en el corazón para ver un mensaje especial ♡<br>
        Haz clic en las estrellas brillantes para ver nuestros recuerdos ✨
    </div-->

    <!-- Scroll hint -->
    <div class="scroll-hint" id="scrollHint">
        <span>nuestros momentos</span>
        <div class="arrow"></div>
    </div>

    <!-- GALERÍA -->
    <section class="gallery-section" id="gallerySection">
        <h2 class="gallery-title">Nuestros momentos</h2>
        <p class="gallery-subtitle">Una foto, una historia ♡</p>
        <div class="polaroids-grid" id="polaroidsGrid"></div>
    </section>

    <script>
        // ==========================================
        // CONFIGURACIÓN DE FOTOS Y TEXTOS
        // ==========================================
        const memories = [
            {
                photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/foto1.jpg", 
                text: "'Sus llamas son un fuego ardiente, la llama de Jah. Las aguas embravecidas no pueden extinguir el amor, ni pueden los ríos llevárselo con la corriente.' - El Cantar de los Canteres 8: 6,7"
            },
            {
                photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/foto2.jpg",
                text: "Te elijo cada día. Mi cariño por ti es profundo y real, y no hay nada que no haría por estar contigo y verte feliz."
            },
            {
                photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/foto5.jpg",
                text: ""
            },
            {
                photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/foto4.jpg",
                text: ""
            },
            {
                photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/foto3.jpg",
                text: "'El amor es paciente y bondadoso... El amor nunca falla.' - 1 Corintios 13: 4-8"
            }
        ];
        // ==========================================

        // ===== TEMA ROSA (activo cada día 6) =====
        const hoy = new Date();
        const esRosa = hoy.getDate() === 6
        if (esRosa) document.body.classList.add('theme-rosa');

        // Colores del canvas según tema
        const ACCENT_COLOR   = esRosa ? '#f4a7c3' : '#87CEEB';
        const ACCENT_RGBA    = esRosa ? (a) => `rgba(244,167,195,${a})` : (a) => `rgba(135,206,250,${a})`;
        const STAR_COLOR     = esRosa ? '#ffe0f0' : 'white';
        // ==========================================

        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = [];
        const interactiveStars = [];
        const constellations = {
            u: [],
            h: []
        };

        // Fechas
        const mainDate = new Date("2026-02-06");     // Fecha oficial visible
        const secretDate = new Date("2025-11-17");   // Fecha secreta (3 clics)

        let usingSecretDate = false;

        function calculateDays(startDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diffTime = today.getTime() - startDate.getTime();
            return Math.floor(diffTime / (1000 * 60 * 60 * 24));
        }

        function updateCounter() {
            const date = usingSecretDate ? secretDate : mainDate;
            document.getElementById('daysCount').textContent = calculateDays(date);
        }

        updateCounter();
        setInterval(updateCounter, 3600000);

        // Animación de explosión de partículas — cubre toda la pantalla
        function triggerBurst() {
            const colors = esRosa
                ? [ACCENT_COLOR, '#ffffff', '#ffb6d9', '#ffd6f0', '#ff85b3', '#ffadd4']
                : [ACCENT_COLOR, '#ffffff', '#b0e0ff', '#caf0ff', '#ffe0b2', '#d0f0ff'];

            // 1) Flash de luz sobre toda la pantalla
            const flash = document.createElement('div');
            flash.style.cssText = `
                position:fixed; inset:0; z-index:9999; pointer-events:none;
                background: radial-gradient(ellipse at center,
                    rgba(255,255,255,0.92) 0%,
                    rgba(${esRosa ? '244,167,195' : '135,206,250'},0.55) 45%,
                    transparent 100%);
                animation: screenFlash 0.9s ease-out forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 1000);

            // 2) Partículas desde 7 orígenes repartidos por la pantalla
            const origins = [
                { x: window.innerWidth * 0.50, y: window.innerHeight * 0.50 },
                { x: window.innerWidth * 0.15, y: window.innerHeight * 0.20 },
                { x: window.innerWidth * 0.85, y: window.innerHeight * 0.20 },
                { x: window.innerWidth * 0.15, y: window.innerHeight * 0.80 },
                { x: window.innerWidth * 0.85, y: window.innerHeight * 0.80 },
                { x: window.innerWidth * 0.50, y: window.innerHeight * 0.10 },
                { x: window.innerWidth * 0.50, y: window.innerHeight * 0.90 },
            ];

            origins.forEach(({ x: cx, y: cy }, oi) => {
                const count = oi === 0 ? 45 : 20;
                for (let i = 0; i < count; i++) {
                    const p = document.createElement('div');
                    p.className = 'burst-particle';
                    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
                    const dist  = oi === 0 ? 130 + Math.random() * 220 : 50 + Math.random() * 130;
                    const size  = 3 + Math.random() * 8;
                    const dur   = 0.6 + Math.random() * 0.9;
                    const delay = oi * 0.045;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    p.style.cssText = `
                        width:${size}px; height:${size}px; background:${color};
                        left:${cx - size/2}px; top:${cy - size/2}px;
                        box-shadow: 0 0 ${size*2.5}px ${color}, 0 0 ${size*5}px ${color}55;
                        --tx:${Math.cos(angle)*dist}px; --ty:${Math.sin(angle)*dist}px; --dur:${dur}s;
                        animation-delay:${delay}s;
                    `;
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), (dur + delay) * 1000 + 200);
                }
            });

            // 3) Flash en el número
            const num = document.getElementById('daysCount');
            num.classList.remove('flash');
            void num.offsetWidth;
            num.classList.add('flash');

        class Star {
            constructor(x, y, radius, isSpecial = false, memoryIndex = -1) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.baseRadius = radius;
                this.isSpecial = isSpecial;
                this.memoryIndex = memoryIndex;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.pulseDirection = 1;
            }

            draw() {
                ctx.save();
                
                if (this.isSpecial) {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 4);
                    gradient.addColorStop(0, ACCENT_RGBA(this.opacity));
                    gradient.addColorStop(0.5, ACCENT_RGBA(this.opacity * 0.3));
                    gradient.addColorStop(1, ACCENT_RGBA(0));
                    ctx.fillStyle = gradient;
                    ctx.fillRect(this.x - this.radius * 4, this.y - this.radius * 4, this.radius * 8, this.radius * 8);
                }

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = esRosa
                    ? `rgba(255, 220, 235, ${this.opacity})`
                    : `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fill();

                ctx.shadowBlur = this.isSpecial ? 20 : 10;
                ctx.shadowColor = this.isSpecial ? ACCENT_COLOR : STAR_COLOR;
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.opacity += this.twinkleSpeed * this.pulseDirection;
                if (this.opacity >= 1 || this.opacity <= 0.5) {
                    this.pulseDirection *= -1;
                }

                if (this.isSpecial) {
                    this.radius = this.baseRadius + Math.sin(Date.now() * 0.003) * 0.5;
                }
            }
        }

        // Función para dibujar líneas de constelación

            for (let i = 1; i < starsArray.length; i++) {

        // Función para crear letra en forma de constelación
        function createLetterConstellation(letter, centerX, centerY, size, group) {
            const letterStars = [];
            const patterns = {

                    {x: 1, y: 1.2}, {x: 1, y: 0.6}, {x: 1, y: 0}, {x: 1, y: -0.6}, {x: 1, y: -1.2}, {x: 1, y: -1.8}
                ],

                    {x: -1, y: -0.6}, {x: -1, y: -0.3}, {x: -1, y: 0}, {x: -1, y: 0.3},
                    {x: -1, y: 0.6}, {x: -1, y: 0.9}, {x: -1, y: 1.2}, {x: -1, y: 1.5}, {x: -1, y: 1.8},
                    // Línea horizontal central (más estrellas)
                    {x: -0.8, y: 0}, {x: -0.6, y: 0}, {x: -0.4, y: 0}, {x: -0.2, y: 0}, 
                    {x: 0, y: 0}, {x: 0.2, y: 0}, {x: 0.4, y: 0}, {x: 0.6, y: 0}, {x: 0.8, y: 0},
                    // Línea derecha (más estrellas)
                    {x: 1, y: -1.8}, {x: 1, y: -1.5}, {x: 1, y: -1.2}, {x: 1, y: -0.9}, 
                    {x: 1, y: -0.6}, {x: 1, y: -0.3}, {x: 1, y: 0}, {x: 1, y: 0.3},
                    {x: 1, y: 0.6}, {x: 1, y: 0.9}, {x: 1, y: 1.2}, {x: 1, y: 1.5}, {x: 1, y: 1.8}
                ],
                'heart': [
                    // Curva superior izquierda (lóbulo izquierdo)
                    {x: -0.8, y: -1.0}, {x: -1.0, y: -0.8}, {x: -1.1, y: -0.5}, 
                    {x: -1.1, y: -0.2}, {x: -1.0, y: 0.1}, {x: -0.8, y: 0.3},
                    // Top izquierdo del corazón
                    {x: -0.6, y: -1.2}, {x: -0.4, y: -1.3}, {x: -0.2, y: -1.3},
                    // Centro top
                    {x: 0, y: -1.2},
                    // Top derecho del corazón
                    {x: 0.2, y: -1.3}, {x: 0.4, y: -1.3}, {x: 0.6, y: -1.2},
                    // Curva superior derecha (lóbulo derecho)
                    {x: 0.8, y: -1.0}, {x: 1.0, y: -0.8}, {x: 1.1, y: -0.5},
                    {x: 1.1, y: -0.2}, {x: 1.0, y: 0.1}, {x: 0.8, y: 0.3},
                    // Diagonal izquierda hacia abajo
                    {x: -0.7, y: 0.5}, {x: -0.6, y: 0.7}, {x: -0.5, y: 0.9},
                    {x: -0.4, y: 1.1}, {x: -0.3, y: 1.3}, {x: -0.2, y: 1.5}, {x: -0.1, y: 1.7},
                    // Diagonal derecha hacia abajo
                    {x: 0.7, y: 0.5}, {x: 0.6, y: 0.7}, {x: 0.5, y: 0.9},
                    {x: 0.4, y: 1.1}, {x: 0.3, y: 1.3}, {x: 0.2, y: 1.5}, {x: 0.1, y: 1.7},
                    // Punta final
                    {x: 0, y: 1.9}
                ]
            };

            const pattern = patterns[letter] || [];
            pattern.forEach(point => {
                const x = centerX + point.x * size;
                const y = centerY + point.y * size;
                const star = new Star(x, y, 2.8);
                letterStars.push(star);
                if (group) constellations[group].push(star);
            });

            return letterStars;
        }

        // Función para crear texto con estrellas
        function createTextConstellation(text, startX, startY, spacing = 18, group = null) {
            const textStars = [];
            ctx.font = 'bold 40px Arial';
            
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;
            const offsetX = startX - textWidth / 2;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === ' ') continue;

                const charWidth = ctx.measureText(char).width;
                const charX = offsetX + ctx.measureText(text.substring(0, i)).width + charWidth / 2;

                const starsPerChar = [];
                for (let j = 0; j < 10; j++) {
                    const angle = (j / 10) * Math.PI * 2;
                    const distance = 15 + Math.random() * 6;
                    const x = charX + Math.cos(angle) * distance;
                    const y = startY + Math.sin(angle) * distance;
                    const star = new Star(x, y, 1.8 + Math.random() * 0.4);
                    starsPerChar.push(star);
                    textStars.push(star);
                }

                if (group) {
                    constellations[group].push(...starsPerChar);
                }
            }
            return textStars;
        }

        // ==========================================
        // SISTEMA DE COMETAS
        // ==========================================
        const comets = [];

        class Comet {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                // Aparecen desde el borde superior o izquierdo
                const fromTop = Math.random() < 0.5;
                if (fromTop) {
                    this.x = Math.random() * canvas.width * 1.2;
                    this.y = -20;
                } else {
                    this.x = -20;
                    this.y = Math.random() * canvas.height * 0.6;
                }

                // Ángulo: siempre hacia abajo-derecha, con variación
                const angle = (Math.PI / 4) + (Math.random() - 0.5) * 0.5;
                this.speed  = 6 + Math.random() * 7;
                this.vx     = Math.cos(angle) * this.speed;
                this.vy     = Math.sin(angle) * this.speed;

                // Cola
                this.tailLength = 80 + Math.random() * 120;
                this.width      = 1.2 + Math.random() * 1.4;
                this.opacity    = initial ? 0 : 0.9 + Math.random() * 0.1;
                this.fadeIn     = initial ? true : false;

                // Color según tema
                this.color = esRosa
                    ? `rgba(255, 200, 230,`
                    : `rgba(200, 235, 255,`;
            }

            update() {
                if (this.fadeIn) {
                    this.opacity += 0.04;
                    if (this.opacity >= 0.9) { this.opacity = 0.9; this.fadeIn = false; }
                }
                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                const tailX = this.x - (this.vx / this.speed) * this.tailLength;
                const tailY = this.y - (this.vy / this.speed) * this.tailLength;

                const grad = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
                grad.addColorStop(0,   `${this.color}0)`);
                grad.addColorStop(0.6, `${this.color}${(this.opacity * 0.4).toFixed(2)})`);
                grad.addColorStop(1,   `${this.color}${this.opacity.toFixed(2)})`);

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = grad;
                ctx.lineWidth   = this.width;
                ctx.lineCap     = 'round';
                ctx.stroke();

                // Destello en la cabeza
                const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.width * 4);
                glow.addColorStop(0, `${this.color}${this.opacity.toFixed(2)})`);
                glow.addColorStop(1, `${this.color}0)`);
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.width * 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            isOffScreen() {
                return this.x > canvas.width + 50 || this.y > canvas.height + 50;
            }
        }

        // Aparición aleatoria: cada 2.5–7 segundos lanza una cometa
        function scheduleComet() {

        // Animación
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Suavizar parallax (lerp)
            parallaxX += (mouseX * PARALLAX_STRENGTH - parallaxX) * 0.05;
            parallaxY += (mouseY * PARALLAX_STRENGTH - parallaxY) * 0.05;

            ctx.save();
            ctx.translate(parallaxX, parallaxY);
            
            // Dibujar cometas (debajo de todo)
            for (let i = comets.length - 1; i >= 0; i--) {
                comets[i].update();
                comets[i].draw();
                if (comets[i].isOffScreen()) comets.splice(i, 1);
            }

            // Dibujar líneas de constelaciones
            drawConstellationLines(constellations.u, ACCENT_RGBA(0.5));
            drawConstellationLines(constellations.h, ACCENT_RGBA(0.5));
            
            // Dibujar estrellas
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            ctx.restore(); // fin parallax

            requestAnimationFrame(animate);
        }

            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid30.jpg", caption: "" },
            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid31.jpg", caption: "" },
            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid32.jpg", caption: "" },
            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid33.jpg", caption: "" },
            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid34.jpg", caption: "" },
            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid35.jpg", caption: "" },
            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid36.jpg", caption: "" },
            { photo: "https://raw.githubusercontent.com/UrielRdzG/Hanni/main/polaroid37.jpg", caption: "" },
    
        ];

        function buildGallery() {
            const grid = document.getElementById('polaroidsGrid');
            const galleryLightbox = galleryPhotos.map(p => ({ photo: p.photo, text: p.caption || '' }));

            galleryPhotos.forEach((item, i) => {
                const rot   = (Math.random() * 10 - 5).toFixed(1);
                const delay = (i * 0.08).toFixed(2);

                const card = document.createElement('div');
                card.className = 'polaroid';
                card.style.cssText = `--rot:${rot}deg; --delay:${delay}s;`;
                card.innerHTML = `
                    <img src="${item.photo}" alt="♥" loading="lazy">
                    <div class="polaroid-caption">${item.caption}</div>
                `;

                card.addEventListener('click', () => openLightbox(galleryLightbox, i));
                grid.appendChild(card);
            });
        }

        // Construir galería + fade-in cuando entre en el viewport
        let galleryBuilt = false;
        const galleryObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    if (!galleryBuilt) {
                        galleryBuilt = true;
                        buildGallery();
                    }
                }
            });
        }, { threshold: 0.05 });

        galleryObserver.observe(document.getElementById('gallerySection'));

        // Ocultar scroll hint al bajar
        window.addEventListener('scroll', () => {
            const hint = document.getElementById('scrollHint');
            if (window.scrollY > 60) {
                hint.classList.add('hidden');
            } else {
                hint.classList.remove('hidden');
            }

            // Ocultar love phrase al salir de la sección principal (hero)
            const heroHeight = window.innerHeight;
            if (window.scrollY > heroHeight * 0.4) {
                lovePhrase.classList.remove('show');
                phraseVisible = false;
            }
        }, { passive: true });
    </script>
</body>
</html>
